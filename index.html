<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabi Robot — Interactive Parts Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    font-family: 'Space Mono', monospace;
    color: #e0e0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 20% 50%, rgba(255,0,200,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 40%, rgba(0,200,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    text-align: center;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #ff3cac, #784ba0, #2b86c5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
    z-index: 1;
  }

  .subtitle {
    font-size: 0.75rem;
    color: #666;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 48px;
    position: relative;
    z-index: 1;
  }

  .stage {
    position: relative;
    width: 500px;
    max-width: 100%;
    z-index: 1;
  }

  .robot-img {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 20px 60px rgba(255,50,180,0.2));
    transition: filter 0.3s ease;
    pointer-events: none;
    user-select: none;
  }

  /* SVG overlay */
  .hotspot-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: visible;
  }

  .hotspot {
    cursor: pointer;
    transition: opacity 0.2s ease;
  }

  .hotspot polygon,
  .hotspot ellipse,
  .hotspot rect {
    fill: transparent;
    stroke: transparent;
    transition: fill 0.2s ease, stroke 0.2s ease, filter 0.2s ease;
  }

  .hotspot:hover polygon,
  .hotspot:hover ellipse,
  .hotspot:hover rect {
    fill: rgba(255,255,255,0.18);
    stroke: rgba(255,255,255,0.7);
    stroke-width: 2;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
  }

  /* Popup */
  .popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.2s ease;
  }

  .popup-overlay.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .popup {
    background: #12121c;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 32px;
    width: 420px;
    max-width: 90vw;
    position: relative;
    animation: slideUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .popup-color-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 16px 16px 0 0;
  }

  .popup h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 4px;
    margin-top: 8px;
  }

  .popup .part-id {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 24px;
  }

  .links-section label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #888;
    display: block;
    margin-bottom: 8px;
  }

  .link-entry {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
  }

  .link-entry input {
    flex: 1;
    background: #1e1e2e;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 10px 12px;
    color: #e0e0f0;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .link-entry input:focus {
    border-color: rgba(255,255,255,0.3);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
  }

  .link-entry input::placeholder { color: #444; }

  .btn-remove {
    background: rgba(255,80,80,0.15);
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff5050;
    border-radius: 6px;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-remove:hover { background: rgba(255,80,80,0.3); transform: scale(1.05); }

  .btn-add-link {
    background: rgba(255,255,255,0.05);
    border: 1px dashed rgba(255,255,255,0.2);
    color: #888;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
    transition: background 0.2s, color 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-add-link:hover { background: rgba(255,255,255,0.1); color: #ccc; }

  .popup-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .btn-save {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    background: linear-gradient(135deg, #ff3cac, #2b86c5);
    color: white;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-save:hover { opacity: 0.9; transform: scale(1.01); }
  .btn-save:active { transform: scale(0.99); }

  .btn-cancel {
    padding: 12px 20px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent;
    color: #888;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .btn-cancel:hover { background: rgba(255,255,255,0.05); color: #ccc; }

  .btn-close {
    position: absolute;
    top: 16px; right: 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #666;
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s;
    z-index: 10;
  }
  .btn-close:hover { background: rgba(255,255,255,0.12); color: #fff; }

  /* Saved links display */
  .saved-links {
    margin-top: 12px;
  }
  .saved-link-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 4px 12px 4px 8px;
    margin: 4px 4px 0 0;
    font-size: 0.7rem;
    color: #aaa;
    text-decoration: none;
    transition: background 0.2s;
  }
  .saved-link-chip:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .saved-link-chip span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Instruction bar */
  .hint {
    margin-top: 32px;
    font-size: 0.68rem;
    color: #444;
    letter-spacing: 0.08em;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 20px 0;
  }

  /* Tooltip label that follows cursor */
  .part-tooltip {
    position: fixed;
    background: #1a1a2e;
    border: 1px solid rgba(255,255,255,0.15);
    color: #e0e0f0;
    font-size: 0.72rem;
    padding: 6px 12px;
    border-radius: 6px;
    pointer-events: none;
    z-index: 500;
    opacity: 0;
    transition: opacity 0.15s ease;
    white-space: nowrap;
    letter-spacing: 0.08em;
    font-family: 'Space Mono', monospace;
  }
  .part-tooltip.visible { opacity: 1; }
</style>
</head>

<p class="hint">HOVER over any part to highlight · CLICK to add database links</p>

<!-- Floating tooltip -->
<div class="part-tooltip" id="partTooltip"></div>

<!-- Popup modal -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup" id="popup">
    <div class="popup-color-bar" id="popupColorBar"></div>
    <button class="btn-close" id="btnClose">✕</button>
    <h2 id="popupTitle">Part Name</h2>
    <div class="part-id" id="popupId">PART-ID</div>

    <div class="links-section">
      <label>Database Links</label>
      <div id="linksContainer"></div>
      <button class="btn-add-link" id="btnAddLink">+ Add another link</button>
    </div>

    <div class="popup-actions">
      <button class="btn-save" id="btnSave">Save Links</button>
      <button class="btn-cancel" id="btnCancel">Cancel</button>
    </div>
  </div>
</div>

<script>
  const partData = {};
  let currentPart = null;

  const overlay = document.getElementById('popupOverlay');
  const popup = document.getElementById('popup');
  const popupTitle = document.getElementById('popupTitle');
  const popupId = document.getElementById('popupId');
  const popupColorBar = document.getElementById('popupColorBar');
  const linksContainer = document.getElementById('linksContainer');
  const btnAddLink = document.getElementById('btnAddLink');
  const btnSave = document.getElementById('btnSave');
  const btnCancel = document.getElementById('btnCancel');
  const btnClose = document.getElementById('btnClose');
  const tooltip = document.getElementById('partTooltip');

  function getPartLinks(partId) {
    return partData[partId] ? [...partData[partId]] : [''];
  }

  function createLinkEntry(value = '') {
    const div = document.createElement('div');
    div.className = 'link-entry';
    const input = document.createElement('input');
    input.type = 'url';
    input.placeholder = 'https://database.example.com/part-info';
    input.value = value;
    const removeBtn = document.createElement('button');
    removeBtn.className = 'btn-remove';
    removeBtn.innerHTML = '×';
    removeBtn.onclick = () => {
      if (linksContainer.children.length > 1) div.remove();
    };
    div.appendChild(input);
    div.appendChild(removeBtn);
    return div;
  }

  function openPopup(partEl) {
    currentPart = partEl.dataset.part;
    const label = partEl.dataset.label;
    const color = partEl.dataset.color;

    popupTitle.textContent = label;
    popupId.textContent = 'PART · ' + currentPart.toUpperCase().replace(/-/g, ' ');
    popupColorBar.style.background = `linear-gradient(90deg, ${color}, ${color}88)`;

    linksContainer.innerHTML = '';
    const links = getPartLinks(currentPart);
    links.forEach(link => linksContainer.appendChild(createLinkEntry(link)));

    overlay.classList.add('active');
  }

  function closePopup() {
    overlay.classList.remove('active');
    currentPart = null;
  }

  btnAddLink.addEventListener('click', () => {
    linksContainer.appendChild(createLinkEntry(''));
    const last = linksContainer.lastElementChild.querySelector('input');
    last.focus();
  });

  btnSave.addEventListener('click', () => {
    const inputs = linksContainer.querySelectorAll('input');
    const links = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
    partData[currentPart] = links;
    closePopup();
    showSavedFeedback();
  });

  function showSavedFeedback() {
    const msg = document.createElement('div');
    msg.textContent = '✓ Links saved';
    msg.style.cssText = `position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
      background:#1e1e2e;border:1px solid rgba(255,255,255,0.15);color:#86efac;
      padding:10px 24px;border-radius:8px;font-size:0.75rem;letter-spacing:0.1em;
      z-index:2000;animation:fadeIn 0.3s ease;font-family:'Space Mono',monospace`;
    document.body.appendChild(msg);
    setTimeout(() => msg.remove(), 2000);
  }

  btnCancel.addEventListener('click', closePopup);
  btnClose.addEventListener('click', closePopup);

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closePopup();
  });

  // Hotspot interactions
  document.querySelectorAll('.hotspot').forEach(el => {
    el.addEventListener('mouseenter', (e) => {
      tooltip.textContent = el.dataset.label;
      tooltip.classList.add('visible');
    });

    el.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 32) + 'px';
    });

    el.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
    });

    el.addEventListener('click', () => {
      openPopup(el);
    });
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePopup();
  });
</script>
</body>
